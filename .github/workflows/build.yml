name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.internal.http.connectionTimeout=180000 -Dorg.gradle.internal.http.socketTimeout=180000 -Dorg.gradle.internal.repository.max.retries=10"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Generate release keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore app/release.keystore \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass qq900236 \
            -keypass qq900236 \
            -dname "CN=XVideoDownloader, OU=Dev, O=XVideo, L=Shanghai, ST=Shanghai, C=CN"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --warning-mode=none

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --warning-mode=none

      - name: Rename APKs
        run: |
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/x-video-downloader-v2.0.5-debug.apk
          fi
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/x-video-downloader-v2.0.5-release.apk
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: x-video-downloader-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 90

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: x-video-downloader-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          tag_name: v2.0.5
          name: X Video Downloader v2.0.5
          body: |
            ## v2.0.5 Release

            ### Features
            - Added fullscreen lock/unlock button
            - Lock button in top-right corner
            - Unlock button appears on tap (auto-hides after 2s)
            - Does not affect video viewing
            - Fixed .ts file exclusion in local video scanning
            - Added video format detection in online player
            - Added one-click download functionality

            ### Build Info
            - Version Code: 205
            - Target SDK: 34
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
