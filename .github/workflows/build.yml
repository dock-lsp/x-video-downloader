name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure gradle.properties
        run: |
          cat >> gradle.properties << EOF

          # Twitter API token from secrets
          TWITTER_BEARER_TOKEN=${{ secrets.TWITTER_BEARER_TOKEN }}
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK (Unsigned)
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APKs with version
        run: |
          cd app/build/outputs/apk

          # Rename debug APK
          if [ -f debug/app-debug.apk ]; then
            mv debug/app-debug.apk x-video-downloader-latest-debug.apk
          fi

          # Rename release APK
          if [ -f release/app-release-unsigned.apk ]; then
            mv release/app-release-unsigned.apk x-video-downloader-latest-release-unsigned.apk
          elif [ -f release/app-release.apk ]; then
            mv release/app-release.apk x-video-downloader-latest-release-unsigned.apk
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: x-video-downloader-debug
          path: app/build/outputs/apk/debug/x-video-downloader-latest-debug.apk
          retention-days: 90

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: x-video-downloader-release-unsigned
          path: app/build/outputs/apk/release/x-video-downloader-latest-release-unsigned.apk
          retention-days: 90

      - name: Display build outputs
        run: |
          echo "=== Build Outputs ==="
          ls -lh app/build/outputs/apk/debug/
          ls -lh app/build/outputs/apk/release/
