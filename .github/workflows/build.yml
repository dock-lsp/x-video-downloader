name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure gradle.properties
        run: |
          cat >> gradle.properties << EOF

          # Twitter API token from secrets
          TWITTER_BEARER_TOKEN=${{ secrets.TWITTER_BEARER_TOKEN }}
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Both Debug and Release
        run: ./gradlew assembleDebug assembleRelease --no-daemon

      - name: Prepare Debug APK
        run: |
          mkdir -p output
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            cp app/build/outputs/apk/debug/app-debug.apk output/x-video-downloader-latest-debug.apk
            echo "✅ Debug APK ready"
          fi

      - name: Prepare Release APK
        run: |
          mkdir -p output
          if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk output/x-video-downloader-latest-release-unsigned.apk
          elif [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk output/x-video-downloader-latest-release-unsigned.apk
          fi
          if [ -f output/x-video-downloader-latest-release-unsigned.apk ]; then
            echo "✅ Release APK ready"
          fi

      - name: List output files
        run: |
          echo "=== Build Outputs ==="
          ls -lh output/

      - name: Upload Debug APK
        if: hashFiles('app/build/outputs/apk/debug/app-debug.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: x-video-downloader-debug
          path: output/x-video-downloader-latest-debug.apk
          retention-days: 90

      - name: Upload Release APK
        if: hashFiles('output/x-video-downloader-latest-release-unsigned.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: x-video-downloader-release-unsigned
          path: output/x-video-downloader-latest-release-unsigned.apk
          retention-days: 90
