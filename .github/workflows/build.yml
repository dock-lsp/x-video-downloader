name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Create Keystore
        run: |
          mkdir -p app
          keytool -genkey -v -keystore app/release.keystore -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass qq900236 -keypass qq900236 \
            -dname "CN=XVideoDownloader, OU=Dev, O=XVD, L=City, ST=State, C=US" 2>/dev/null || true

      - name: Build Debug
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 || cat app/build/outputs/logs/*.log 2>/dev/null || true

      - name: Check build output
        run: |
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug APK not found"
          ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "Release APK not found"

      - name: Upload APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xvd-apk
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          retention-days: 5
