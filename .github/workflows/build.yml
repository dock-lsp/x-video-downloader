name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle_home
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Create Keystore
        run: |
          mkdir -p app
          keytool -genkey -v -keystore app/release.keystore -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass qq900236 -keypass qq900236 \
            -dname "CN=XVideoDownloader, OU=Dev, O=XVD, L=City, ST=State, C=US" 2>/dev/null || true

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          echo "=== Files in workspace ==="
          ls -la
          echo "=== Settings file ==="
          cat settings.gradle
          echo "=== Running Gradle ==="
          ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tail -100

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tail -50

      - name: List APK outputs
        run: |
          echo "=== Debug APKs ==="
          find app/build/outputs/apk -name "*.apk" 2>/dev/null || echo "No APK found"
          echo "=== Release APKs ==="
          find app/build/outputs/apk -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xvd-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xvd-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
