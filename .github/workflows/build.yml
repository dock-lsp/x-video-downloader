name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore
          else
            # Generate debug keystore for testing
            keytool -genkey -v -keystore app/release.keystore -alias release \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass qq900236 -keypass qq900236 \
              -dname "CN=XVideoDownloader, OU=Dev, O=XVD, L=City, ST=State, C=US"
          fi

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace || true

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Build release APK
        if: always()
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_PASSWORD" ]; then
            ./gradlew assembleRelease --no-daemon \
              -Pkeystore.file=app/release.keystore \
              -Pkeystore.password=$KEYSTORE_PASSWORD \
              -Pkey.alias=$KEY_ALIAS \
              -Pkey.password=$KEY_PASSWORD || true
          else
            ./gradlew assembleRelease --no-daemon || true
          fi

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Release-APK
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
