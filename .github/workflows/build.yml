name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure gradle.properties
        run: |
          cat >> gradle.properties << EOF
          
          # Twitter API token from secrets
          TWITTER_BEARER_TOKEN=${{ secrets.TWITTER_BEARER_TOKEN }}
          EOF

      - name: Generate release keystore
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_PASSWORD" ]; then
            keytool -genkeypair \
              -v \
              -keystore app/release.keystore \
              -alias release \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "$KEYSTORE_PASSWORD" \
              -keypass "$KEY_PASSWORD" \
              -dname "CN=XVideoDownloader, OU=Dev, O=XVideo, L=Shanghai, ST=Shanghai, C=CN"
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        if: env.KEYSTORE_PASSWORD != ''
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename release APK
        if: env.KEYSTORE_PASSWORD != ''
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/x-video-downloader-v1.1.0-release.apk || true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: x-video-downloader-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 90

      - name: Upload Release APK
        if: env.KEYSTORE_PASSWORD != ''
        uses: actions/upload-artifact@v4
        with:
          name: x-video-downloader-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
