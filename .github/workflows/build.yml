name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: eclipse-temurin:17-jdk
    
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y git unzip

      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Keystore
        run: |
          mkdir -p app
          keytool -genkey -v -keystore app/release.keystore -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass qq900236 -keypass qq900236 \
            -dname "CN=XVideoDownloader, OU=Dev, O=XVD, L=City, ST=State, C=US" 2>/dev/null || true

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: List APK outputs
        if: always()
        run: find app/build/outputs/apk -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: xvd-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: xvd-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
