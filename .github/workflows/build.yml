name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Create Keystore
        run: |
          mkdir -p app
          keytool -genkey -v -keystore app/release.keystore -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass qq900236 -keypass qq900236 \
            -dname "CN=XVideoDownloader, OU=Dev, O=XVD, L=City, ST=State, C=US" 2>/dev/null || true

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: List APK outputs
        run: |
          echo "=== Debug APKs ==="
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APK"
          echo "=== Release APKs ==="
          ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "No release APK"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: xvd-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: xvd-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
