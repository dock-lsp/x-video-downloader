name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: x-video-downloader-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 90

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: x-video-downloader-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Found version: $VERSION"

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## X Video Downloader v${{ steps.version.outputs.version }}

            ### 📥 APK 下载

            下载下方 Assets 中的 APK 文件安装到 Android 设备即可使用。

            - **Debug 版**: `app-debug.apk` (开发调试版，体积较大)
            - **Release 版**: `app-release.apk` (正式发布版，推荐)

            ### 📋 更新内容
            - AI 编程助手功能
            - 自动生成代码文件（按目录结构创建）
            - 对话历史记录
            - 项目文件浏览器
            - 代码自动保存

            ### 🔧 安装说明
            1. 下载 APK 文件
            2. 在 Android 设备上允许"未知来源"安装
            3. 点击 APK 文件安装
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
