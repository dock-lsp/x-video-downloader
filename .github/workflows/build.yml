name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate release keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore app/release.keystore \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass qq900236 \
            -keypass qq900236 \
            -dname "CN=XVideoDownloader, OU=Dev, O=XVideo, L=Shanghai, ST=Shanghai, C=CN"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Rename release APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/x-video-downloader-v1.1.0-release.apk || true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: x-video-downloader-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 90

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: x-video-downloader-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
